workflows:
  ios-workflow:
    name: iOS Workflow

    max_build_duration: 120

    environment:
      node: latest

      vars:
        BUNDLE_ID: com.ibrahemherzallah.stellagold

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Generate native ios project
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/*.xcworkspace \
            --scheme "Stella Gold" \
            --archive-flags="-allowProvisioningUpdates"

    artifacts:
      - build/ios/ipa/*.ipa