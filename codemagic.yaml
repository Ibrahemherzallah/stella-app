workflows:
  ios-workflow:
    name: iOS Workflow

    max_build_duration: 120

    environment:
      node: latest

      vars:
        BUNDLE_ID: com.ibrahemherzallah.stellagold

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Generate native ios project
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios && pod install
          

      - name: Create export options
        script: |
          python3 - <<'PY'
          import plistlib

          data = {
              "method": "app-store-connect",
              "signingStyle": "automatic",
              "uploadBitcode": False,
              "compileBitcode": False,
          }

          with open("/Users/builder/export_options.plist", "wb") as f:
              plistlib.dump(data, f)

          print("Created export_options.plist")
          PY

          plutil -lint /Users/builder/export_options.plist


      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/*.xcworkspace \
            --scheme "Stella Gold" \
            --archive-flags="-allowProvisioningUpdates" \
            --export-options-plist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa